openapi: 3.1.0
info:
  title: OFAC SDN JSON Wrapper API
  version: 1.0.0
  description: >
    Unofficial JSON wrapper for OFAC Sanctions List Service exports. This API provides
    access to U.S. Treasury sanctions data through a modern, developer-friendly interface.
    Data source is OFAC SLS exports.
  contact:
    name: Robert Melrose
    url: https://devs.miami/finance
  license:
    name: MIT
servers:
  - url: https://sdn-openapi.netlify.app
    description: Production server
tags:
  - name: Search
    description: Search and query operations
  - name: Entity
    description: Entity retrieval operations
  - name: Metadata
    description: Dataset information
  - name: Admin
    description: Administrative operations
paths:
  /api/meta:
    get:
      tags:
        - Metadata
      summary: Get dataset metadata
      description: >
        Retrieve information about the current dataset including source URLs, fetch time, row counts,
        source file hashes, and the latest refresh delta summary.
        
        Check dataset metadata and freshness to ensure you're working with current data.
        API requests are rate-limited to 100 requests per minute per IP address.
      operationId: getMeta
      responses:
        "200":
          description: Metadata retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  fetchedAt:
                    type: string
                    format: date-time
                    description: ISO 8601 timestamp of last data refresh
                  source:
                    type: object
                    properties:
                      sdnUrl:
                        type: string
                        format: uri
                      altUrl:
                        type: string
                        format: uri
                      addUrl:
                        type: string
                        format: uri
                  counts:
                    type: object
                    properties:
                      sdnRows:
                        type: integer
                      altRows:
                        type: integer
                      addRows:
                        type: integer
                      entities:
                        type: integer
                  hashes:
                    type: object
                    properties:
                      sdnSha256:
                        type: string
                      altSha256:
                        type: string
                      addSha256:
                        type: string
                  delta:
                    type: object
                    properties:
                      addedCount:
                        type: integer
                      removedCount:
                        type: integer
                      changedCount:
                        type: integer
                required:
                  - fetchedAt
                  - source
                  - counts
                  - hashes
              example:
                fetchedAt: "2026-06-29T06:00:35.535Z"
                source:
                  sdnUrl: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.CSV"
                  altUrl: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/ALT.CSV"
                  addUrl: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/ADD.CSV"
                counts:
                  sdnRows: 19123
                  altRows: 20307
                  addRows: 24896
                  entities: 19122
                hashes:
                  sdnSha256: "96f40a145e41cb22616efeaf15e36ba3ac17ab8bd1a7f8b23e8ff977584b9073"
                  altSha256: "f26cea0edcf21932fb2039e5787aff32401c72e827e67a51013a5491e4a246b7"
                  addSha256: "b0fc427d52193ec4654cc41999e79464588910064981f2d44748ad360e97f7d9"
  /api/search:
    get:
      tags:
        - Search
      summary: Fuzzy search SDN entities
      description: Search for entities in the OFAC sanctions list by name or alias using fuzzy matching
      operationId: searchEntities
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
          description: Search query string (name or alias)
          example: "Maduro"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Maximum number of results to return
          example: 10
      responses:
        "200":
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  q:
                    type: string
                  count:
                    type: integer
                    description: Number of returned matches
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        uid:
                          type: string
                          description: Unique entity identifier
                        name:
                          type: string
                          description: Primary entity name
                        type:
                          type: string
                          enum: [Individual, Entity]
                          description: Entity type
                        score:
                          type: number
                          format: float
                          description: Match score (0-1)
                      required:
                        - uid
                        - name
                        - type
                        - score
                required:
                  - ok
                  - q
                  - count
                  - results
              example:
                ok: true
                q: "Maduro"
                count: 2
                results:
                  - uid: "12345"
                    name: "Nicolás Maduro"
                    type: "Individual"
                    score: 0.98
                  - uid: "12346"
                    name: "Nicolás Maduro Moros"
                    type: "Individual"
                    score: 0.85
        "400":
          description: Bad request - missing or invalid query parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
              example:
                error: "Missing required parameter: q"
                code: "MISSING_QUERY"
  /api/entity/{uid}:
    get:
      tags:
        - Entity
      summary: Get entity details
      description: Retrieve complete details for a specific entity by its unique identifier
      operationId: getEntity
      parameters:
        - in: path
          name: uid
          required: true
          schema:
            type: string
          description: Entity unique identifier (ent_num)
          example: "12345"
      responses:
        "200":
          description: Entity details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  entity:
                    type: object
                    properties:
                      uid:
                        type: string
                      name:
                        type: string
                      type:
                        type: string
                      programs:
                        type: array
                        items:
                          type: string
                      remarks:
                        type: string
                      aka:
                        type: array
                        items:
                          type: string
                      addresses:
                        type: array
                        items:
                          type: object
                          properties:
                            address:
                              type: string
                            city:
                              type: string
                            country:
                              type: string
                required:
                  - ok
                  - entity
              example:
                ok: true
                entity:
                  uid: "12345"
                  name: "Nicolás Maduro"
                  type: "Individual"
                  aka:
                    - "Nicolás Maduro Moros"
                    - "Maduro"
                  programs:
                    - "VENEZUELA"
                  addresses:
                    - address: "Miraflores Palace"
                      city: "Caracas"
                      country: "Venezuela"
        "404":
          description: Entity not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
              example:
                error: "Entity not found"
                code: "NOT_FOUND"
  /api/update:
    post:
      tags:
        - Admin
      summary: Trigger manual dataset refresh
      description: >
        Manually trigger a refresh of the OFAC dataset. Manual calls require the configured update
        secret via X-Update-Secret, X-API-Key, Authorization Bearer token, or JSON secret body.
      operationId: triggerUpdate
      parameters:
        - in: header
          name: X-Update-Secret
          required: false
          schema:
            type: string
          description: Shared secret for manual update authentication
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                  description: Shared secret for manual update authentication
      responses:
        "200":
          description: Update triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  meta:
                    type: object
              example:
                ok: true
                meta:
                  fetchedAt: "2026-06-29T06:00:35.535Z"
                  counts:
                    entities: 19122
                  delta:
                    addedCount: 0
                    removedCount: 0
                    changedCount: 0
        "401":
          description: Unauthorized - invalid or missing secret
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              example:
                error: "Unauthorized"
