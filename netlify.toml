[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  command = "npm run build"
  publish = "public"
  ignore = "netlify/functions/**/*.test.ts"

[[redirects]]
  from = "/api/entity/*"
  to = "/.netlify/functions/ofac-entity"
  status = 200

[[redirects]]
  from = "/api/search/*"
  to = "/.netlify/functions/ofac-search"
  status = 200

[[redirects]]
  from = "/api/meta/*"
  to = "/.netlify/functions/ofac-meta"
  status = 200

[[redirects]]
  from = "/api/update/*"
  to = "/.netlify/functions/ofac-update"
  status = 200

# SPA-style redirect rule for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = "!req.path.startsWith(/api) && !req.path.startsWith(/openapi) && !req.path.endsWith(.html) && !req.path.endsWith(.css) && !req.path.endsWith(.js) && !req.path.endsWith(.json) && !req.path.endsWith(.yaml)"
