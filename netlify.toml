[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  command = "npm run build"
  publish = "public"
  ignore = "netlify/functions/**/*.test.ts"

[[redirects]]
  from = "/api/entity/:uid"
  to = "/.netlify/functions/ofac-entity/:uid"
  status = 200

[[redirects]]
  from = "/api/search/*"
  to = "/.netlify/functions/ofac-search"
  status = 200

[[redirects]]
  from = "/api/meta/*"
  to = "/.netlify/functions/ofac-meta"
  status = 200

[[redirects]]
  from = "/api/update/*"
  to = "/.netlify/functions/ofac-update"
  status = 200

# SPA-style redirect rule for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = "!req.path.startswith(/api) && !req.path.startswith(/openapi) && !req.path.endswith(.html) && !req.path.endswith(.css) && !req.path.endswith(.js) && !req.path.endswith(.json) && !req.path.endswith(.yaml)"
